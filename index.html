<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaMark | Professional Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #e2e8f0; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: #1e293b; }
        .app-window { background: white; width: 98%; height: 92%; max-width: 1600px; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid #cbd5e1; }
        .window-header { padding: 1rem 1.5rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .section-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.25rem; height: 100%; display: flex; flex-direction: column; }
        .canvas-container { background: #f8fafc; border-radius: 6px; border: 1px solid #e2e8f0; aspect-ratio: 16 / 9; position: relative; cursor: move; overflow: hidden; width: 100%; }
        canvas { width: 100%; height: 100%; }
        .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #e2e8f0; border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden; }
        .pos-item { background: #f8fafc; padding: 0.6rem 0.2rem; font-size: 10px; font-weight: 600; text-align: center; cursor: pointer; color: #64748b; }
        .pos-item.active { background: #e2e8f0; color: #1e293b; }
        .btn-blue { background: #336791; color: white; }
        .btn-green { background: #3a8d5f; color: white; }
        input[type="range"] { accent-color: #336791; cursor: pointer; }
        .toggle-switch { width: 36px; height: 20px; background: #336791; border-radius: 20px; position: relative; }
        .toggle-circle { width: 14px; height: 14px; background: white; border-radius: 50%; position: absolute; right: 3px; top: 3px; }
    </style>
</head>
<body>

<div class="app-window">
    <div class="window-header">
        <div class="flex items-center gap-3">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="text-xl font-bold tracking-tight">LuminaMark</span>
        </div>
        <div class="flex gap-4 text-slate-400 font-bold text-lg"><span>—</span><span>?</span><span>✕</span></div>
    </div>

    <div class="grid grid-cols-3 gap-6 p-6 flex-1 overflow-hidden">
        <div class="flex flex-col gap-4">
            <h3 class="font-bold text-sm">Source Image</h3>
            <div class="section-card gap-4">
                <button onclick="document.getElementById('fileIn').click()" class="w-full py-2 px-4 border border-slate-300 rounded flex items-center justify-center gap-2 text-sm font-medium hover:bg-slate-50">
                    <span>🖼️</span> Choose Image
                </button>
                <input type="file" id="fileIn" class="hidden" accept="image/*">
                <div class="canvas-container" id="canvasWrapper">
                    <canvas id="pCanvas"></canvas>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <h3 class="font-bold text-sm">Watermark Tool</h3>
            <div class="section-card">
                <div class="bg-slate-50 border border-slate-100 rounded-lg p-4 mb-4 flex items-center justify-center relative flex-1 min-h-[150px]">
                    <img id="logoPre" src="./assets/watermark.png" class="max-w-[120px] max-h-full object-contain">
                    <span class="absolute bottom-2 right-2 text-slate-400">🔍</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="text-xs font-bold block mb-1">Opacity</label>
                        <input type="range" id="opInput" class="w-full" value="80">
                    </div>
                    <div>
                        <label class="text-xs font-bold block mb-1">Scale</label>
                        <input type="range" id="scInput" class="w-full" value="20" min="5" max="80">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="text-xs font-bold block mb-2">Position</label>
                    <div class="pos-grid">
                        <div onclick="setPos('tl', event)" class="pos-item">↖<br>Top-Left</div>
                        <div onclick="setPos('tc', event)" class="pos-item">↑<br>Center</div>
                        <div onclick="setPos('tr', event)" class="pos-item">↗<br>Top-Right</div>
                        <div onclick="setPos('ml', event)" class="pos-item">←<br>Left</div>
                        <div onclick="setPos('mc', event)" class="pos-item">⊹<br>Top</div>
                        <div onclick="setPos('br', event)" class="pos-item active" id="pos-br">↘<br>Bottom-Right</div>
                    </div>
                </div>
                <p class="text-[10px] text-slate-500 uppercase font-bold text-center">Protected by MS House Engineering</p>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <h3 class="font-bold text-sm">Advanced Export</h3>
            <div class="section-card">
                <div class="space-y-6 flex-1">
                    <div>
                        <label class="text-xs font-bold block mb-2">Security Features</label>
                        <div class="flex justify-between items-start">
                            <div class="flex gap-2">
                                <span class="text-xs">🔒</span>
                                <p class="text-[11px] leading-tight">Enable Cryptographic<br>Signature (L2 Hidden)</p>
                            </div>
                            <div class="toggle-switch"><div class="toggle-circle"></div></div>
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold block mb-2">Format</label>
                        <select class="w-full p-2 border border-slate-300 rounded text-xs font-medium bg-white">
                            <option>High Quality PNG</option>
                        </select>
                    </div>
                </div>

                <div class="mt-auto space-y-3">
                    <button onclick="render()" class="w-full py-3 btn-blue rounded-md font-bold text-sm flex items-center justify-center gap-2">
                        <span>👁️</span> REFRESH PREVIEW
                    </button>
                    <button onclick="exportFull(event)" class="w-full py-3 btn-green rounded-md font-bold text-sm flex items-center justify-center gap-2">
                        <span>📥</span> SAVE PROTECTED IMAGE
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<canvas id="eCanvas" class="hidden"></canvas>

<script>
    const pc = document.getElementById('pCanvas'), ec = document.getElementById('eCanvas');
    const px = pc.getContext('2d'), ex = ec.getContext('2d');
    const opInput = document.getElementById('opInput'), scInput = document.getElementById('scInput');
    const logoPre = document.getElementById('logoPre');
    let sImg = new Image(), wImg = new Image(), logoX = 85, logoY = 85, isDragging = false;

    // --- SMART LOGO LOADING ---
    // This tries lowercase 'assets' first, then uppercase 'Assets' if it fails
    function initLogo() {
        wImg.crossOrigin = "anonymous";
        wImg.src = "./assets/watermark.png";
        
        wImg.onerror = function() {
            if (wImg.src.includes("assets")) {
                console.log("Retrying with Uppercase Assets...");
                wImg.src = "./Assets/watermark.png";
                logoPre.src = "./Assets/watermark.png";
            } else {
                alert("STILL NOT FOUND: Please rename your folder to 'assets' (lowercase) and file to 'watermark.png'.");
            }
        };
    }

    initLogo();

    wImg.onload = () => render();
    opInput.oninput = () => render();
    scInput.oninput = () => render();

    document.getElementById('fileIn').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => { sImg.onload = () => render(); sImg.src = f.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    function updateLogoPosition(e) {
        if (!pc.width) return;
        const rect = pc.getBoundingClientRect();
        logoX = ((e.clientX - rect.left) / rect.width) * 100;
        logoY = ((e.clientY - rect.top) / rect.height) * 100;
        render();
    }

    pc.addEventListener('mousedown', (e) => { isDragging = true; updateLogoPosition(e); });
    window.addEventListener('mousemove', (e) => { if(isDragging) updateLogoPosition(e); });
    window.addEventListener('mouseup', () => { isDragging = false; });

    function setPos(p, event) {
        if(p==='tl'){logoX=10;logoY=10;} else if(p==='tc'){logoX=50;logoY=10;} else if(p==='tr'){logoX=90;logoY=10;}
        else if(p==='ml'){logoX=10;logoY=50;} else if(p==='mc'){logoX=50;logoY=50;} else if(p==='br'){logoX=90;logoY=90;}
        document.querySelectorAll('.pos-item').forEach(i => i.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');
        render();
    }

    function render() {
        if (!sImg.src) return;
        const w = 1600, h = 900;
        pc.width = w; pc.height = h;
        px.clearRect(0, 0, w, h);
        px.drawImage(sImg, 0, 0, w, h);
        
        if(wImg.complete && wImg.naturalWidth !== 0) {
            const sz = w * (scInput.value / 100);
            px.save();
            px.globalAlpha = opInput.value / 100;
            px.drawImage(wImg, (logoX / 100) * w - (sz/2), (logoY / 100) * h - (sz/2), sz, sz);
            px.restore();
        }
    }

    async function exportFull(event) {
        const fileInput = document.getElementById('fileIn');
        if (!fileInput.files[0]) return alert("Select an image first.");

        const btn = event.currentTarget;
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ RUNNING L2 ENCRYPTION...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        
        try {
            const responseWm = await fetch(wImg.src);
            const wmBlob = await responseWm.blob();
            formData.append('watermark', wmBlob);

            const response = await fetch('https://luminamark-backend.onrender.com/process', { 
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error("Server Error - Please check your Render logs.");

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "LuminaMark_Protected.png";
            a.click();
        } catch (err) {
            alert("Export Failed: " + err.message);
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
