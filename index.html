<script>
    const viewer = document.getElementById('canvasWrapper');
    const watermarkPre = document.getElementById('logoPre');
    let baseImage = new Image();
    let watermarkImage = new Image();

    // Set Up Image Sources
    watermarkImage.src = "Assets/watermark.png"; // MAKE SURE THIS FILE IS NOW TRANSPARENT

    // 1. Initial Load of Watermark
    watermarkImage.onload = () => {
        watermarkPre.src = watermarkImage.src;
        watermarkPre.style.width = "100px"; // Set default width
        watermarkPre.style.height = "auto";
        watermarkPre.style.position = "absolute"; // Allows movement
        watermarkPre.style.pointerEvents = "none"; // Ignores mouse so viewer gets the event
    };

    // 2. Handle Base Image Upload (Restored functionality)
    document.getElementById('fileIn').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            baseImage.onload = () => {
                // Clear the loader/text and show the canvas
                const pc = document.getElementById('pCanvas');
                const px = pc.getContext('2d');
                pc.width = baseImage.width;
                pc.height = baseImage.height;
                px.drawImage(baseImage, 0, 0);
                document.getElementById('canvasWrapper').style.aspectRatio = baseImage.width / baseImage.height;
            };
            baseImage.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    // 3. New Functionality: Move with Mouse Cursor
    viewer.addEventListener('mousemove', (e) => {
        // Find the mouse position relative to the viewing container
        const rect = viewer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Position the watermark so it is centered on the cursor
        watermarkPre.style.left = (x - watermarkPre.offsetWidth / 2) + 'px';
        watermarkPre.style.top = (y - watermarkPre.offsetHeight / 2) + 'px';
    });
</script>
