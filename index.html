<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invo Studio | Premium Asset Protection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f7fa; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: #1a202c; overflow: hidden; }
        .app-window { background: white; width: 98%; height: 94%; max-width: 1700px; border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.2); border: 1px solid #e2e8f0; overflow: hidden; }
        .window-header { padding: 1.25rem 2.5rem; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center; background: #ffffff; }
        .section-card { background: #ffffff; border: 1px solid #edf2f7; border-radius: 16px; padding: 2rem; height: 100%; display: flex; flex-direction: column; }
        .canvas-container { background: #f8fafc; border-radius: 12px; border: 2px dashed #cbd5e1; aspect-ratio: 16 / 9; position: relative; cursor: none; overflow: hidden; width: 100%; transition: border-color 0.3s; }
        .canvas-container:hover { border-color: #1a202c; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .btn-premium { background: #1a202c; color: white; transition: all 0.2s ease; border-radius: 12px; }
        .btn-premium:hover { background: #000000; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input[type="range"] { accent-color: #1a202c; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-window">
    <div class="window-header">
        <div class="flex items-center gap-5">
            <div class="bg-slate-900 p-3 rounded-xl text-white shadow-inner">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-[0.2em] uppercase text-slate-900">Invo Studio</h1>
                <p class="text-[11px] font-bold text-slate-400 tracking-widest uppercase mt-0.5">Asset Protection Suite</p>
            </div>
        </div>
        <div class="flex gap-4 text-slate-300 font-bold text-xl"><span>—</span><span>▢</span><span>✕</span></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 p-8 flex-1 overflow-hidden">
        
        <div class="flex flex-col gap-5 lg:col-span-2">
            <h3 class="text-[12px] font-black uppercase text-slate-400 tracking-wider">01. Import & Position</h3>
            <div class="section-card">
                <button onclick="document.getElementById('fileIn').click()" class="w-full py-4 px-6 border-2 border-slate-200 rounded-xl flex items-center justify-center gap-4 text-sm font-extrabold hover:bg-slate-50 transition-all mb-4 group">
                    <span class="group-hover:scale-110 transition-transform">🖼️</span> Choose Base Image
                </button>
                <input type="file" id="fileIn" class="hidden" accept="image/*">
                
                <div class="canvas-container" id="canvasWrapper">
                    <canvas id="pCanvas"></canvas>
                </div>
                <p class="mt-4 text-center text-[11px] text-slate-400 font-bold uppercase tracking-widest">Move your mouse over the image to position the watermark</p>
            </div>
        </div>

        <div class="flex flex-col gap-5">
            <h3 class="text-[12px] font-black uppercase text-slate-400 tracking-wider">02. Configuration & Export</h3>
            <div class="section-card">
                
                <div class="space-y-8 mb-8">
                    <div>
                        <div class="flex justify-between mb-3">
                            <label class="text-[11px] font-black uppercase text-slate-500 tracking-widest">Opacity</label>
                            <span id="opVal" class="text-[11px] font-bold text-slate-800">80%</span>
                        </div>
                        <input type="range" id="opInput" class="w-full h-2 bg-slate-200 rounded-lg appearance-none" value="80">
                    </div>
                    <div>
                        <div class="flex justify-between mb-3">
                            <label class="text-[11px] font-black uppercase text-slate-500 tracking-widest">Scale</label>
                            <span id="scVal" class="text-[11px] font-bold text-slate-800">20%</span>
                        </div>
                        <input type="range" id="scInput" class="w-full h-2 bg-slate-200 rounded-lg appearance-none" value="20" min="5" max="80">
                    </div>
                </div>

                <div class="p-5 bg-slate-50 rounded-xl border border-slate-200 mb-8">
                    <h4 class="text-[10px] font-black text-slate-900 uppercase tracking-widest mb-2">Active Protocols:</h4>
                    <ul class="text-[11px] text-slate-500 font-medium space-y-2">
                        <li>✔️ White Background Removal</li>
                        <li>✔️ Cursor-Tracking Position</li>
                        <li>✔️ Secure L2 Encryption</li>
                    </ul>
                </div>

                <div class="mt-auto">
                    <button onclick="exportFull(event)" class="w-full py-4 btn-premium rounded-xl font-black text-xs tracking-widest flex items-center justify-center gap-3 uppercase">
                        <span>📥</span> Export Protected Asset
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const pc = document.getElementById('pCanvas');
    const px = pc.getContext('2d');
    const opInput = document.getElementById('opInput'), scInput = document.getElementById('scInput');
    
    let sImg = new Image(); // The background image
    let rawWImg = new Image(); // The original watermark
    let cleanWImg = new Image(); // The transparent watermark
    
    let logoX = 50, logoY = 50; 
    let isMouseOver = false;

    // --- AUTO PATH & WHITE REMOVAL ---
    function initLogo() {
        const paths = ["./assets/watermark.png", "./Assets/watermark.png", "assets/watermark.png", "watermark.png"];
        let currentIdx = 0;

        rawWImg.onload = () => {
            // MAGIC: This makes the white background transparent automatically
            const tCanvas = document.createElement('canvas');
            tCanvas.width = rawWImg.width; 
            tCanvas.height = rawWImg.height;
            const tCtx = tCanvas.getContext('2d');
            tCtx.drawImage(rawWImg, 0, 0);
            
            const imgData = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height);
            for(let i = 0; i < imgData.data.length; i += 4) {
                // If the pixel is white (or very light gray), make it completely transparent
                if(imgData.data[i] > 200 && imgData.data[i+1] > 200 && imgData.data[i+2] > 200) {
                    imgData.data[i+3] = 0; 
                }
            }
            tCtx.putImageData(imgData, 0, 0);
            cleanWImg.onload = () => render();
            cleanWImg.src = tCanvas.toDataURL();
        };

        function tryNext() {
            if (currentIdx < paths.length) {
                rawWImg.src = paths[currentIdx];
                currentIdx++;
            } else {
                console.error("Watermark not found.");
            }
        }
        rawWImg.onerror = tryNext;
        tryNext();
    }

    initLogo();

    // UI Updates
    opInput.oninput = () => { document.getElementById('opVal').innerText = opInput.value + "%"; render(); };
    scInput.oninput = () => { document.getElementById('scVal').innerText = scInput.value + "%"; render(); };

    // File Upload
    document.getElementById('fileIn').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => { 
            sImg.onload = () => render(); 
            sImg.src = f.target.result; 
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- MOUSE TRACKING ---
    pc.addEventListener('mouseenter', () => { isMouseOver = true; });
    pc.addEventListener('mouseleave', () => { isMouseOver = false; render(); });
    pc.addEventListener('mousemove', (e) => {
        if (!sImg.src) return;
        isMouseOver = true;
        const rect = pc.getBoundingClientRect();
        // Convert mouse position to percentages
        logoX = ((e.clientX - rect.left) / rect.width) * 100;
        logoY = ((e.clientY - rect.top) / rect.height) * 100;
        render();
    });

    // Drawing the canvas
    function render() {
        if (!sImg.src) return;
        const w = 1920, h = 1080; // High-res internal preview
        pc.width = w; pc.height = h;
        px.clearRect(0, 0, w, h);
        px.drawImage(sImg, 0, 0, w, h);
        
        // Only draw the watermark if the mouse is hovering over the canvas
        if(cleanWImg.complete && cleanWImg.naturalWidth !== 0 && isMouseOver) {
            const sz = w * (scInput.value / 100);
            px.save();
            px.globalAlpha = opInput.value / 100;
            px.drawImage(cleanWImg, (logoX / 100) * w - (sz/2), (logoY / 100) * h - (sz/2), sz, sz);
            px.restore();
        }
    }

    // Export Functionality
    async function exportFull(event) {
        const fileInput = document.getElementById('fileIn');
        if (!fileInput.files[0]) return;

        const btn = event.currentTarget;
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ ENCRYPTING...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        
        try {
            const responseWm = await fetch(cleanWImg.src);
            const wmBlob = await responseWm.blob();
            formData.append('watermark', wmBlob);

            const response = await fetch('https://luminamark-backend.onrender.com/process', { 
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error("Server communication lost.");

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `InvoStudio_${Date.now()}.png`;
            a.click();
        } catch (err) {
            console.error(err.message);
            // Fallback: If Render server fails, download directly from browser
            const fallbackUrl = pc.toDataURL("image/png");
            const a = document.createElement('a');
            a.href = fallbackUrl;
            a.download = `InvoStudio_Local_${Date.now()}.png`;
            a.click();
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
